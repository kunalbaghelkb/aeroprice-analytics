name: Deploy to Hugging Face
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to HF Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # HF Username
          git push --force https://kunal-baghel:$HF_TOKEN@huggingface.co/spaces/kunal-baghel/AeroPrice-API main