name: Deploy to Hugging Face
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Smart Sync to HF Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Robot's identity setup
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"

          # 2. Clean HF Spaces
          git clone https://kunal-baghel:$HF_TOKEN@huggingface.co/spaces/kunal-baghel/AeroPrice-API hf_space

          # 3. Copy New Code without deleting HF Space or .git folder
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='README.md' \
            --exclude='hf_space/' \
            --exclude='notebook/' \
            --exclude='notebooks/' \
            ./ hf_space/

          # 4. Get Dynamic Commit Message from the Latest Commit
          cd hf_space
          git add .
          git commit -m "${{ github.event.head_commit.message }}" || echo "No changes to commit"
          
          # Normal push
          git push https://kunal-baghel:$HF_TOKEN@huggingface.co/spaces/kunal-baghel/AeroPrice-API main